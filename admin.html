<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GadgetHQ Admin | Inventory Management</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            padding-top: 40px;
            padding-bottom: 100px;
        }

        .inventory-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        .inventory-table th,
        .inventory-table td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        .inventory-table th {
            color: var(--primary);
            font-size: 14px;
            text-transform: uppercase;
        }

        .img-preview {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 500px;
            width: 90%;
        }

        .login-screen {
            position: fixed;
            inset: 0;
            background: var(--darker);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-error {
            color: #ff4444;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .form-status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }

        .form-status.success {
            display: block;
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid rgba(40, 167, 69, 0.3);
        }

        .form-status.error {
            display: block;
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }
    </style>
</head>

<body>
    <div id="login-screen" class="login-screen">
        <div class="form-container glass" style="max-width: 400px;">
            <h2>Admin Login</h2>
            <div class="form-group" style="margin-top: 20px;">
                <label>PIN Code</label>
                <input type="password" id="admin-pin" placeholder="••••">
            </div>
            <div id="login-error" class="login-error">Invalid PIN! Please try again.</div>
            <button id="login-btn" class="btn btn-primary btn-block">Access Dashboard</button>
        </div>
    </div>

    <header class="header">
        <div class="container">
            <div class="logo">Gadget<span>HQ ADMIN</span></div>
            <a href="index.html" class="btn btn-secondary btn-sm">View Site</a>
        </div>
    </header>

    <main class="admin-container">
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Inventory List</h2>
                <button id="add-item-btn" class="btn btn-primary">+ Add New Gadget</button>
            </div>

            <div class="glass" style="margin-top: 30px; border-radius: 20px; overflow: hidden;">
                <table class="inventory-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-body">
                        <!-- Dynamic Rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- CRUD Modal -->
    <div id="crud-modal" class="modal">
        <div class="modal-content form-container glass">
            <h2 id="modal-title">Add New Gadget</h2>
            <div id="form-status-msg" class="form-status"></div>
            <form id="gadget-form" style="margin-top: 20px;">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="p-name" required>
                </div>
                <div class="form-group">
                    <label>Price (₦)</label>
                    <input type="number" id="p-price" required>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="p-image" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Or Upload Image</label>
                    <input type="file" id="p-file" accept="image/*">
                    <small id="upload-status" style="display: block; margin-top: 5px; color: #666;"></small>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="p-status">
                        <option value="Available">Available</option>
                        <option value="Sold Out">Sold Out</option>
                    </select>
                </div>
                <div class="step-actions">
                    <button type="button" id="close-modal" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>

</html>
